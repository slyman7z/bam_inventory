<header class="h-16 bg-slate-900 border-b border-slate-800/80 px-4 flex items-center justify-between shrink-0 z-30">
    <div class="flex items-center gap-3">
        <!-- Mobile Menu Toggle Button -->
        <button id="mobile-sidebar-toggle"
            class="p-2 -ml-2 rounded-lg hover:bg-slate-800 text-slate-400 hover:text-white md:hidden transition-colors">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16"></path>
            </svg>
        </button>

        <!-- Logo -->
        <div class="flex items-center gap-2">
            <div class="bg-pink-500/10 p-1.5 rounded-lg border border-pink-500/20">
                <svg class="w-5 h-5 text-pink-500" fill="none" stroke="currentColor" stroke-width="2"
                    viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round"
                        d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"></path>
                </svg>
            </div>
         <a href = "{% url 'home' %}" > <span class="text-lg font-bold tracking-tight bg-gradient-to-r from-pink-400 to-rose-400 bg-clip-text text-transparent hidden sm:block">BAM</span> </a>
        </div>
    </div>

    <!-- Right Side Nav Actions -->
    <div class="flex items-center gap-4">
        <span
            class="inline-flex items-center gap-1.5 px-2.5 py-1 rounded-full text-xs font-medium bg-emerald-500/10 text-emerald-400 border border-emerald-500/20">
            <span class="w-1.5 h-1.5 rounded-full bg-emerald-500 animate-pulse"></span> Live System
        </span>
        <div
            class="h-8 w-8 rounded-xl bg-gradient-to-tr from-pink-600 to-rose-500 flex items-center justify-center text-xs font-bold text-white ring-2 ring-slate-800">
            IS
        </div>
    </div>
</header>
