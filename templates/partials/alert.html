{% if messages %}
<style>
    .alert-message {
        animation: slideIn 0.3s ease-out forwards;
        transition: all 0.3s ease;
    }
    
    .alert-message.closing {
        animation: slideOut 0.3s ease-in forwards;
    }
    
    @keyframes slideIn {
        from {
            opacity: 0;
            transform: translateY(-10px) scale(0.95);
        }
        to {
            opacity: 1;
            transform: translateY(0) scale(1);
        }
    }
    
    @keyframes slideOut {
        from {
            opacity: 1;
            transform: translateY(0) scale(1);
        }
        to {
            opacity: 0;
            transform: translateY(-10px) scale(0.95);
        }
    }
    
    .alert-close-btn {
        transition: all 0.2s ease;
        cursor: pointer;
    }
    
    .alert-close-btn:hover {
        transform: rotate(90deg);
        background: rgba(255, 255, 255, 0.1);
    }
</style>

<div class="space-y-3 my-4 max-w-md mx-auto w-full px-1" id="alert-container">
    {% for message in messages %}
    <div class="alert-message flex items-start gap-3 p-4 rounded-xl border bg-slate-900/80 backdrop-blur-md
        {% if message.tags == 'error' or message.tags == 'danger' %}
            border-rose-500/30 text-rose-400 bg-gradient-to-r from-rose-950/20 to-slate-900/80
        {% elif message.tags == 'success' %}
            border-emerald-500/30 text-emerald-400 bg-gradient-to-r from-emerald-950/20 to-slate-900/80
        {% elif message.tags == 'warning' %}
            border-amber-500/30 text-amber-400 bg-gradient-to-r from-amber-950/20 to-slate-900/80
        {% else %}
            border-pink-500/30 text-pink-400 bg-gradient-to-r from-pink-950/20 to-slate-900/80
        {% endif %}"
        data-message-id="{{ forloop.counter }}">
        
        <!-- Icon -->
        <div class="shrink-0 mt-0.5">
            {% if message.tags == 'error' or message.tags == 'danger' %}
                <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
            {% elif message.tags == 'success' %}
                <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
            {% elif message.tags == 'warning' %}
                <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
            {% else %}
                <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
            {% endif %}
        </div>

        <!-- Message Text -->
        <div class="text-xs font-medium leading-relaxed flex-grow">
            {{ message }}
        </div>

        <!-- Close Button -->
        <button type="button" class="alert-close-btn shrink-0 p-1 rounded-full text-slate-500 hover:text-white transition-all" 
                onclick="closeAlert(this)" 
                aria-label="Close notification">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"></path>
            </svg>
        </button>
    </div>
    {% endfor %}
</div>

<script>
    // Close individual alert with animation
    function closeAlert(button) {
        const alertDiv = button.closest('.alert-message');
        if (!alertDiv) return;
        
        // Add closing animation class
        alertDiv.classList.add('closing');
        
        // Remove from DOM after animation completes
        setTimeout(() => {
            alertDiv.remove();
            
            // If no alerts remain, remove the container
            const container = document.getElementById('alert-container');
            if (container && container.children.length === 0) {
                container.remove();
            }
        }, 300);
    }

    // Auto-dismiss alerts after 5 seconds (optional)
    document.addEventListener('DOMContentLoaded', function() {
        const alerts = document.querySelectorAll('.alert-message');
        alerts.forEach((alert, index) => {
            // Stagger auto-dismiss to avoid all disappearing at once
            setTimeout(() => {
                const closeBtn = alert.querySelector('.alert-close-btn');
                if (closeBtn) {
                    closeBtn.click();
                }
            }, 5000 + (index * 300)); // 5s + stagger
        });
    });

    // Keyboard support: Close alert with Escape key
    document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') {
            const alerts = document.querySelectorAll('.alert-message');
            if (alerts.length > 0) {
                const lastAlert = alerts[alerts.length - 1];
                const closeBtn = lastAlert.querySelector('.alert-close-btn');
                if (closeBtn) {
                    closeBtn.click();
                }
            }
        }
    });
</script>
{% endif %}
