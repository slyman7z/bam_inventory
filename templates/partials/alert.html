{% if messages %}
<div class="space-y-3 my-4 max-w-md mx-auto w-full px-1">
    {% for message in messages %}
    <div class="flex items-start gap-3 p-4 rounded-xl border bg-slate-900/80 backdrop-blur-md transition-all animate-fade-in
        {% if message.tags == 'error' or message.tags == 'danger' %}
            border-rose-500/30 text-rose-400 bg-gradient-to-r from-rose-950/20 to-slate-900/80
        {% elif message.tags == 'success' %}
            border-emerald-500/30 text-emerald-400 bg-gradient-to-r from-emerald-950/20 to-slate-900/80
        {% elif message.tags == 'warning' %}
            border-amber-500/30 text-amber-400 bg-gradient-to-r from-amber-950/20 to-slate-900/80
        {% else %}
            border-pink-500/30 text-pink-400 bg-gradient-to-r from-pink-950/20 to-slate-900/80
        {% endif %}">
        
        <div class="shrink-0 mt-0.5">
            {% if message.tags == 'error' or message.tags == 'danger' %}
                <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
            {% elif message.tags == 'success' %}
                <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
            {% else %}
                <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
            {% endif %}
        </div>

        <div class="text-xs font-medium leading-relaxed flex-grow">
            {{ message }}
        </div>
    </div>
    {% endfor %}
</div>
{% endif %}
