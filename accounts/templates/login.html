<!DOCTYPE html>
<html lang="en" class="h-full bg-slate-950 text-slate-100">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In | StockPulse</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        pink: {
                            50: '#fdf2f8',
                            100: '#fce7f3',
                            400: '#f472b6',
                            500: '#ec4899',
                            600: '#db2777',
                            900: '#50072b',
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="flex flex-col min-h-full font-sans antialiased justify-center items-center px-4 py-12 sm:px-6 lg:px-8 relative overflow-hidden">

    <div class="hidden sm:block absolute top-1/4 left-1/2 -translate-x-1/2 -translate-y-1/2 w-96 h-96 bg-pink-500/10 rounded-full blur-3xl pointer-events-none"></div>

    <div class="w-full max-w-md space-y-8 relative z-10">
        <div class="text-center">
            <a href="/" class="inline-flex items-center gap-2.5 mb-6 group">
                <div class="bg-pink-500/10 p-2.5 rounded-xl border border-pink-500/20 group-hover:border-pink-500/40 transition-colors">
                    <svg class="w-6 h-6 text-pink-500" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"></path>
                    </svg>
                </div>
                <span class="text-2xl font-bold tracking-tight bg-gradient-to-r from-pink-400 to-rose-400 bg-clip-text text-transparent">BAM</span>
            </a>
            <h2 class="text-2xl font-bold tracking-tight text-white">Welcome back</h2>
            <p class="mt-2 text-sm text-slate-400">
                Enter your credentials to access the inventory system
            </p>
        </div>

        <div class="bg-slate-900/40 sm:bg-slate-900/60 backdrop-blur-xl border-0 sm:border border-slate-800/80 rounded-2xl p-0 sm:p-8 shadow-xl">
            {% include 'partials/alert.html' %}
            <form class="space-y-5" action="{% url 'login' %}" method="POST">
                {% csrf_token %}
                
                <div>
                    <label for="email" class="block text-xs font-semibold uppercase tracking-wider text-slate-400 mb-2">email or Email</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none text-slate-500">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
                            </svg>
                        </div>
                        <input id="email" name="email" type="text" required autocomplete="email" 
                            class="block w-full pl-11 pr-4 py-3 bg-slate-950/60 border border-slate-800 rounded-xl text-slate-100 placeholder-slate-500 focus:outline-none focus:border-pink-500 focus:ring-1 focus:ring-pink-500 transition-all text-sm" 
                            placeholder="admin_user">
                    </div>
                </div>

                <div>
                    <div class="flex items-center justify-between mb-2">
                        <label for="password" class="block text-xs font-semibold uppercase tracking-wider text-slate-400">Password</label>
                        <a href="#" class="text-xs font-medium text-pink-400 hover:text-pink-300 transition-colors">Forgot password?</a>
                    </div>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none text-slate-500">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path>
                            </svg>
                        </div>
                        <input id="password" name="password" type="password" required autocomplete="current-password" 
                            class="block w-full pl-11 pr-4 py-3 bg-slate-950/60 border border-slate-800 rounded-xl text-slate-100 placeholder-slate-500 focus:outline-none focus:border-pink-500 focus:ring-1 focus:ring-pink-500 transition-all text-sm" 
                            placeholder="••••••••">
                    </div>
                </div>

                <div class="flex items-center justify-between pt-1">
                    <div class="flex items-center">
                        <input id="remember-me" name="remember-me" type="checkbox" 
                            class="h-4 w-4 rounded border-slate-800 bg-slate-950 text-pink-600 focus:ring-pink-500 focus:ring-offset-slate-950 accent-pink-600">
                        <label for="remember-me" class="ml-2 block text-xs font-medium text-slate-400 select-none">Remember this device</label>
                    </div>
                </div>

                <div class="pt-2">
                    <button type="submit" 
                        class="group relative flex w-full justify-center bg-gradient-to-r from-pink-600 to-rose-600 hover:from-pink-500 hover:to-rose-500 text-white font-semibold py-3 px-4 rounded-xl shadow-lg shadow-pink-600/10 transition-all active:scale-[0.99] text-sm">
                        Sign In to Dashboard
                    </button>
                </div>
            </form>
        </div>

        <p class="text-center text-xs text-slate-500">
            Secure connection verified. 
            <a href="/" class="ml-1 font-medium text-slate-400 hover:text-slate-300 transition-colors inline-flex items-center gap-0.5">
                Back to landing
                <svg class="w-3 h-3" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
            </a>
        </p>
    </div>

</body>
</html>
