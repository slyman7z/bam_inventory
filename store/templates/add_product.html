{% extends 'base.html' %}
{% block content %}
<!-- ======== ADD PRODUCT FORM PAGE ======== -->

<main class="flex-1 flex items-start justify-center pt-4 pb-8 px-4 md:pt-6 md:pb-12 md:px-6 overflow-y-auto">
    <div
        class="relative bg-slate-900 border border-slate-800/50 rounded-2xl max-w-2xl w-full shadow-2xl shadow-black/50">
        <!-- Form Header -->
        <div class="flex items-center justify-between p-6 border-b border-slate-800/50">
            <div class="flex items-center gap-3">
                <div class="p-2 bg-pink-500/10 rounded-xl border border-pink-500/20">
                    <svg class="w-5 h-5 text-pink-400" fill="none" stroke="currentColor" stroke-width="2"
                        viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"></path>
                    </svg>
                </div>
                <div>
                    <h2 class="text-xl font-bold text-slate-50">Add New Product</h2>
                    <p class="text-xs text-slate-400">Fill in the details to add a new product</p>
                </div>
            </div>
        </div>

        <!-- Form Body -->
        <div class="p-6">
            {% include 'partials/alert.html' %}
            <form method="post" action="{% url 'add_product' %}" enctype="multipart/form-data">
                {% csrf_token %}
                <div class="space-y-4">
                    <!-- Product Name -->
                    <div>
                        <label class="block text-sm font-medium text-slate-300 mb-1.5">Product Name *</label>
                        <input type="text" name="name" required
                            class="w-full bg-slate-800/60 border border-slate-700/50 rounded-xl px-4 py-2.5 text-sm text-slate-200 placeholder:text-slate-500 focus:outline-none focus:ring-2 focus:ring-pink-500/50 focus:border-transparent transition-all"
                            placeholder="Enter product name">
                    </div>

                    <!-- Description -->
                    <div>
                        <label class="block text-sm font-medium text-slate-300 mb-1.5">Description</label>
                        <textarea name="description" rows="3"
                            class="w-full bg-slate-800/60 border border-slate-700/50 rounded-xl px-4 py-2.5 text-sm text-slate-200 placeholder:text-slate-500 focus:outline-none focus:ring-2 focus:ring-pink-500/50 focus:border-transparent transition-all resize-none"
                            placeholder="Enter product description"></textarea>
                    </div>

                    <!-- Category & Price Row -->
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-slate-300 mb-1.5">Category *</label>
                            <select name="category" required
                                class="w-full bg-slate-800/60 border border-slate-700/50 rounded-xl px-4 py-2.5 text-sm text-slate-200 focus:outline-none focus:ring-2 focus:ring-pink-500/50 focus:border-transparent transition-all">
                                <option value="">Select Category</option>
                                {% for category in categories %}
                                <option value="{{ category.id }}">{{category}}</option>
                                {% endfor %}

                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-slate-300 mb-1.5">Price *</label>
                            <div class="relative">
                                <span class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400">₦</span>
                                <input type="number" name="price" step="0.01" required
                                    class="w-full bg-slate-800/60 border border-slate-700/50 rounded-xl pl-7 pr-4 py-2.5 text-sm text-slate-200 placeholder:text-slate-500 focus:outline-none focus:ring-2 focus:ring-pink-500/50 focus:border-transparent transition-all"
                                    placeholder="0.00">
                            </div>
                        </div>
                    </div>

                    <!-- Stock & Compare Price Row -->
                    <!-- <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-slate-300 mb-1.5">Stock Quantity *</label>
                            <input type="number" name="stock" required
                                class="w-full bg-slate-800/60 border border-slate-700/50 rounded-xl px-4 py-2.5 text-sm text-slate-200 placeholder:text-slate-500 focus:outline-none focus:ring-2 focus:ring-pink-500/50 focus:border-transparent transition-all"
                                placeholder="0">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-slate-300 mb-1.5">Compare Price</label>
                            <div class="relative">
                                <span class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400">$</span>
                                <input type="number" name="compare_price" step="0.01"
                                    class="w-full bg-slate-800/60 border border-slate-700/50 rounded-xl pl-7 pr-4 py-2.5 text-sm text-slate-200 placeholder:text-slate-500 focus:outline-none focus:ring-2 focus:ring-pink-500/50 focus:border-transparent transition-all"
                                    placeholder="0.00">
                            </div>
                        </div>
                    </div> -->

                    <!-- Product Image -->
                    <div>
                        <label class="block text-sm font-medium text-slate-300 mb-1.5">Product Image</label>
                        <div class="border-2 border-dashed border-slate-700/50 rounded-xl p-6 text-center hover:border-pink-500/30 transition-colors cursor-pointer"
                            id="imageDropZone">
                            <input type="file" name="image" accept="image/*" class="w-full">
                            <svg class="w-10 h-10 mx-auto text-slate-500 mb-2" fill="none" stroke="currentColor"
                                stroke-width="1.5" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round"
                                    d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z">
                                </path>
                            </svg>
                            <p class="text-sm text-slate-400">Click or drag to upload image</p>
                            <p class="text-xs text-slate-500 mt-1">PNG, JPG, WEBP up to 5MB</p>
                        </div>
                    </div>

                    <!-- Status -->
                    <!-- <div>
                        <label class="block text-sm font-medium text-slate-300 mb-1.5">Status</label>
                        <select name="status"
                            class="w-full bg-slate-800/60 border border-slate-700/50 rounded-xl px-4 py-2.5 text-sm text-slate-200 focus:outline-none focus:ring-2 focus:ring-pink-500/50 focus:border-transparent transition-all">
                            <option value="active">Active</option>
                            <option value="draft">Draft</option>
                            <option value="archived">Archived</option>
                        </select>
                    </div> -->
                </div>

                <!-- Form Actions -->
                <div class="flex items-center justify-end gap-3 mt-6 pt-6 border-t border-slate-800/50">
                    <button type="reset"
                        class="px-4 py-2 text-sm font-medium text-slate-400 hover:text-slate-200 transition-colors">Reset</button>
                    <button type="submit"
                        class="px-6 py-2 text-sm font-medium text-white bg-gradient-to-r from-pink-500 to-rose-500 rounded-xl hover:from-pink-600 hover:to-rose-600 transition-all shadow-lg shadow-pink-500/20">
                        Add Product
                    </button>
                </div>
            </form>
        </div>
    </div>
</main>
{% endblock %}
