<!-- ======== ADD CATEGORY PAGE ======== -->
{% extends 'base.html' %}
{% block content %}

<main class="flex-1 flex justify-center p-4 md:p-6 bg-slate-950/50">
    <div class="w-full max-w-md">
        <!-- Page Header -->
        <div class="flex items-center justify-between mb-6">
            <div class="flex items-center gap-3">
                <div class="p-2 bg-blue-500/10 rounded-xl border border-blue-500/20">
                    <svg class="w-5 h-5 text-blue-400" fill="none" stroke="currentColor" stroke-width="2"
                        viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round"
                            d="M7 7h.01M7 3h5c.512 0 1.024.195 1.414.586l7 7a2 2 0 010 2.828l-7 7a2 2 0 01-2.828 0l-7-7A1.994 1.994 0 013 12V7a4 4 0 014-4z">
                        </path>
                    </svg>
                </div>
                <div>
                    <h1 class="text-2xl font-bold tracking-tight text-slate-50">Add New Category</h1>
                    <p class="text-xs text-slate-400">Create a new product category</p>
                </div>
            </div>
            <a href="" class="p-2 rounded-lg hover:bg-slate-800/60 transition-colors">
                <svg class="w-5 h-5 text-slate-400" fill="none" stroke="currentColor" stroke-width="2"
                    viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"></path>
                </svg>
            </a>
        </div>
        {% include 'partials/alert.html' %}
        <!-- Category Form Card -->
        <div class="bg-slate-900/70 border border-slate-800/50 rounded-2xl shadow-2xl shadow-black/50 backdrop-blur-sm">
            <div class="p-6">
                <form action="{% url 'add_category' %}" method="POST">
                    {% csrf_token %}
                    <div class="space-y-4">
                        <div>
                            <label class="block text-sm font-medium text-slate-300 mb-1.5">
                                Category Name <span class="text-rose-400">*</span>
                            </label>
                            <input type="text" name="name" required
                                class="w-full bg-slate-800/60 border border-slate-700/50 rounded-xl px-4 py-2.5 text-sm text-slate-200 placeholder:text-slate-500 focus:outline-none focus:ring-2 focus:ring-blue-500/50 focus:border-transparent transition-all"
                                placeholder="Enter category name">
                        </div>

                        <div>
                            <label class="block text-sm font-medium text-slate-300 mb-1.5">Description</label>
                            <textarea name="description" rows="3"
                                class="w-full bg-slate-800/60 border border-slate-700/50 rounded-xl px-4 py-2.5 text-sm text-slate-200 placeholder:text-slate-500 focus:outline-none focus:ring-2 focus:ring-blue-500/50 focus:border-transparent transition-all resize-y min-h-[80px]"
                                placeholder="Enter category description (optional)"></textarea>
                        </div>

                    </div>
                    <!-- Form Actions -->
                    <div
                        class="flex items-center justify-end gap-3 p-6 border-t border-slate-800/50 bg-slate-900/30 rounded-b-2xl">
                        <a href="{% url 'product_management' %}"
                            class="px-4 py-2 text-sm font-medium text-slate-400 hover:text-slate-200 transition-colors">
                            back
                        </a>
                        <button type="submit"
                            class="px-6 py-2 text-sm font-medium text-white bg-gradient-to-r from-pink-500 to-indigo-500 rounded-xl hover:from-pink-600 hover:to-slate-600 transition-all shadow-lg shadow-blue-500/20">
                            <span class="flex items-center gap-2">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2"
                                    viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 6v6m0 0v6m0-6h6m-6 0H6">
                                    </path>
                                </svg>
                                Add Category
                            </span>
                        </button>
                    </div>
                </form>

            </div>


        </div>
    </div>
</main>

{% endblock %}
